<!doctype html>
<html
    xmlns:th="https://www.thymeleaf.org"
    th:replace="~{gateway_fragments/layout :: layout(title = |登录 - ${site.title}|, head = ~{::head}, body = ~{::body})}"
>
    <head>
        <style>
          html { background-color: #111111; }
          html[data-theme="light"] { background-color: #ffffff; }
        </style>
        <link rel="stylesheet" th:href="@{/assets/css/login.css}" />
        <script th:src="@{/assets/js/gateway-toast.js}" defer></script>
        <script th:src="@{/assets/js/login.js}" defer></script>
        
        <meta name="default-theme" th:content="${theme.config.basic.defaultTheme ?: 'dark'}" />
        <script>
          (function() {
            var meta = document.querySelector('meta[name="default-theme"]');
            var defaultTheme = (meta && meta.content) || 'dark';
            var scheme = localStorage.getItem('color-scheme');
            if (!scheme || scheme === 'auto') { scheme = defaultTheme; }
            document.documentElement.setAttribute('data-theme', scheme);
            document.documentElement.setAttribute('data-default-theme', defaultTheme);
          })();
        </script>
    </head>
    
    <th:block th:fragment="body">
        <div class="sepo-gateway-background">
          <div th:if="${theme.config.home == null || theme.config.home.backgroundConfig == null || theme.config.home.backgroundConfig.showHeroBackground == null || theme.config.home.backgroundConfig.showHeroBackground}" 
               class="sepo-gateway-wallpaper">
            <th:block th:with="bgUrl = ${theme.config.home != null && theme.config.home.backgroundConfig != null && theme.config.home.backgroundConfig.heroBackground != null && !#strings.isEmpty(theme.config.home.backgroundConfig.heroBackground) ? theme.config.home.backgroundConfig.heroBackground : '/themes/theme-Serenity/assets/public/labixiaoxi.webp'}">
              <video th:if="${#strings.endsWith(#strings.toLowerCase(bgUrl), '.mp4') || #strings.endsWith(#strings.toLowerCase(bgUrl), '.webm')}" 
                     th:src="${bgUrl}" 
                     class="sepo-gateway-wallpaper-media"
                     autoplay 
                     loop 
                     muted 
                     playsinline
                     disablepictureinpicture></video>
              <div th:unless="${#strings.endsWith(#strings.toLowerCase(bgUrl), '.mp4') || #strings.endsWith(#strings.toLowerCase(bgUrl), '.webm')}" 
                   class="sepo-gateway-wallpaper-media"
                   th:style="'background-image: url(' + ${bgUrl} + ');'"></div>
            </th:block>
          </div>
        </div>
        
        <!-- 主题装饰图片 -->
        <div class="theme-decor" th:if="${theme.config.home == null || theme.config.home.decorConfig == null || theme.config.home.decorConfig.showThemeDecor == null || theme.config.home.decorConfig.showThemeDecor}">
          <img th:src="${theme.config.home != null && theme.config.home.decorConfig != null && theme.config.home.decorConfig.customDecorLight != null && !#strings.isEmpty(theme.config.home.decorConfig.customDecorLight) ? theme.config.home.decorConfig.customDecorLight : '/themes/theme-Serenity/assets/public/light.webp'}" alt="" class="theme-decor-light" />
          <img th:src="${theme.config.home != null && theme.config.home.decorConfig != null && theme.config.home.decorConfig.customDecorDark != null && !#strings.isEmpty(theme.config.home.decorConfig.customDecorDark) ? theme.config.home.decorConfig.customDecorDark : '/themes/theme-Serenity/assets/public/dark.webp'}" alt="" class="theme-decor-dark" />
        </div>
        
        <a href="/" class="sepo-gateway-back-button">
          <span>&lt;</span>
          <span>返回网站</span>
        </a>
        
        <div class="gateway-wrapper">
            <div class="sepo-gateway-content-container">
                <div class="sepo-gateway-main-card">
                    <div class="sepo-gateway-header-section">
                        <div class="sepo-gateway-brand-logo">
                            <img th:src="${site.logo ?: (site.favicon ?: '/themes/theme-Serenity/assets/public/ics6.webp')}" 
                                 th:alt="${site.title}" 
                                 alt="Logo" />
                        </div>
                        <div class="sepo-gateway-brand-text">
                            <h1 class="sepo-gateway-site-title" th:text="${site.title}">Serenity</h1>
                            <p class="sepo-gateway-site-subtitle" th:text="${site.subtitle}">一个优雅的博客</p>
                        </div>
                    </div>
                    
                    <div th:replace="~{gateway_fragments/login::form}"></div>
                    
                    <div th:if="${globalInfo.allowRegistration}" class="sepo-gateway-switch-section">
                        <span>还没有账户？</span>
                        <a th:href="@{/signup}">立即注册</a>
                    </div>
                </div>
                
                <div class="sepo-gateway-footer-outside">
                    <p>
                        Powered by <a href="https://halo.run" target="_blank" rel="noopener">Halo</a>
                        <span th:if="${theme.config.basic.siteInfo.author}"> · Theme by <span th:text="${theme.config.basic.siteInfo.author}"></span></span>
                    </p>
                </div>
            </div>
        </div>
    </th:block>
</html>
